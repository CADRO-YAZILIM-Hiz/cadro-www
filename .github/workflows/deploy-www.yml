name: www.cadro.io Deploy - Static Site

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          mkdir deploy
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.txt" -o -name "*.xml" -o -name "*.json" -o -name "*.csv" -o -name "*.md" -o -name "*.ico" -o -name "*.png" -o -name "*.svg" -o -name "*.webp" -o -name "*.webmanifest" -o -name ".htaccess" -o -name "llms.txt" \) -exec cp {} deploy/ \; 2>/dev/null || true
          cp -r ar de en assets scripts ik-yazilimi images deploy/ 2>/dev/null || true
          echo "Deploy folder size: $(du -sh deploy/)"
          echo "File count: $(find deploy -type f | wc -l)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat << EOF > ~/.ssh/config
          Host cadro-prod
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Deploy to Hostinger via rsync
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            deploy/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/html/