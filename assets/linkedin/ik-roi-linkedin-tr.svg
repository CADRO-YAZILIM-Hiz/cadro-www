<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">CADRO İK ROI Hesaplama - LinkedIn Görseli (TR)</title>
  <desc id="desc">İK ROI hesaplama aracı için TL ve USD örnek sonuçları içeren Türkçe sosyal medya görseli.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#0f766e" />
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)" />
  <circle cx="1040" cy="170" r="180" fill="#22d3ee" opacity="0.15" />
  <circle cx="140" cy="1080" r="220" fill="#34d399" opacity="0.12" />

  <text x="80" y="110" fill="#a5f3fc" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">CADRO</text>
  <text x="80" y="170" fill="#ffffff" font-size="56" font-family="Arial, Helvetica, sans-serif" font-weight="800">İK ROI Hesaplama Aracı</text>
  <text x="80" y="220" fill="#d1fae5" font-size="30" font-family="Arial, Helvetica, sans-serif">Ornek Senaryo: 150 çalışan, 4 İK uzmanı, haftada 12 saat manuel iş, yılda 35 alım</text>

  <rect x="80" y="280" width="1040" height="280" rx="24" fill="#ffffff" opacity="0.1" />
  <text x="120" y="350" fill="#99f6e4" font-size="32" font-family="Arial, Helvetica, sans-serif" font-weight="700">TL Sonucu</text>
  <text x="120" y="410" fill="#ffffff" font-size="48" font-family="Arial, Helvetica, sans-serif" font-weight="800">Yıllık Tasarruf: ₺690.360</text>
  <text x="120" y="465" fill="#ffffff" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">Geri Ödeme Süresi: &lt; 1 ay</text>
  <text x="120" y="515" fill="#ccfbf1" font-size="30" font-family="Arial, Helvetica, sans-serif">Tahmini Yıllık Yazılım Maliyeti: ₺25.200  |  ROI: %2640</text>

  <rect x="80" y="610" width="1040" height="280" rx="24" fill="#ffffff" opacity="0.1" />
  <text x="120" y="680" fill="#99f6e4" font-size="32" font-family="Arial, Helvetica, sans-serif" font-weight="700">USD Sonucu</text>
  <text x="120" y="740" fill="#ffffff" font-size="48" font-family="Arial, Helvetica, sans-serif" font-weight="800">Annual Savings: $19,724</text>
  <text x="120" y="795" fill="#ffffff" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">Estimated Software Cost: $720/year</text>
  <text x="120" y="845" fill="#ccfbf1" font-size="30" font-family="Arial, Helvetica, sans-serif">Assumption: 1 USD = 35 TRY  |  Payback: &lt; 1 month</text>

  <text x="80" y="980" fill="#ffffff" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Hemen deneyin: cadro.io/ik-roi-hesaplama.html</text>
  <text x="80" y="1030" fill="#99f6e4" font-size="24" font-family="Arial, Helvetica, sans-serif">Not: Sonuçlar örnek girdilerle hesaplanmış tahmini değerlerdir.</text>
</svg>
