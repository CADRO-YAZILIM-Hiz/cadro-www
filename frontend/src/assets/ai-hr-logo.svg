<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <defs>
    <linearGradient id="proGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" /> <stop offset="100%" stop-color="#3b82f6" /> </linearGradient>
    
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" /> <stop offset="100%" stop-color="#22d3ee" /> </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(15, 20)">
    <path d="M 40 0 L 80 23 L 80 68 L 40 91 L 0 68 L 0 23 Z" fill="none" stroke="url(#iconGradient)" stroke-width="6" stroke-linejoin="round"/>
    
    <path d="M 30 25 L 30 70 M 30 25 L 45 25 C 58 25, 58 45, 45 45 L 30 45" fill="none" stroke="#0f172a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    
    <circle cx="52" cy="35" r="5" fill="#22d3ee" filter="url(#glow)"/>
  </g>

  <g transform="translate(115, 75)" font-family="system-ui, -apple-system, sans-serif" font-style="italic" font-weight="900" font-size="52">
    <text x="0" y="0" fill="#0f172a" letter-spacing="-2">
      Personel<tspan fill="url(#proGradient)" letter-spacing="-1">PRO</tspan>
    </text>
  </g>
  
  <text x="120" y="100" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#64748b" letter-spacing="4.5" text-transform="uppercase">
    AI Destekli İK Sistemi
  </text>
</svg>