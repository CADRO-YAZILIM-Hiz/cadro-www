name: hr_mobile_app
description: HR SaaS mobile application built with Flutter.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  mobile_scanner: ^7.2.0
  file_picker: ^8.1.2
  image: ^4.2.0
  image_picker: ^1.1.2
  open_filex: ^4.5.0
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  flutter_svg: ^2.0.17
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/graphics/hr-tech-grid.svg
    - assets/graphics/Cadro Logo.png
